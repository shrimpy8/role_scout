<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>{% block title %}Role Scout{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    .banner-review { background: #fff3cd; border-left: 4px solid #ffc107; }
    .banner-cancelled { background: #f8f9fa; border-left: 4px solid #6c757d; }
    .banner-error { background: #f8d7da; border-left: 4px solid #dc3545; }
    .badge-fresh { background-color: #198754; }
    .badge-cached { background-color: #6c757d; }
    .tailor-panel { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 4px; }
    .watchlist-star { color: #ffc107; }
    .ttl-warning { color: #fd7e14; }
    .cost-warning { background: #fff3cd; border: 1px solid #ffc107; }
    [hidden] { display: none !important; }
  </style>
</head>
<body class="p-3">
  <div id="rs-banner" role="region" aria-label="Pipeline review"></div>
  <div id="rs-cost-warning" hidden></div>
  <main id="main-content">
    {% block content %}{% endblock %}
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/banner.js') }}"></script>
  <script src="{{ url_for('static', filename='js/threshold.js') }}"></script>
  <script src="{{ url_for('static', filename='js/watchlist.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
